image: "buildkite/hosted-agent-base-images:ubuntu-jammy"

secrets:
  GITHUB_TOKEN: GITHUB_TOKEN
  BUILDKITE_API_TOKEN: API_TOKEN_BUILDKITE

env:
  GITHUB_CLI_VERSION: "2.83.0"
  BUILDKITE_MCP_SERVER_VERSION: "0.7.3"
  TRIGGER_ON_LABEL: "mcp-eval"
  MODEL_PROVIDER: "anthropic"
  # Queue for the blocking eval agent step (babystand.sh), generated by
  # scripts/handler.ts. Kept separate from the PR CI queue below so the eval
  # agent and the PR builds it waits on never contend for the same agents.
  EVAL_AGENT_QUEUE: "default-queue"

# PR CI (lint/test) and the generator step run here. The bork PR builds the eval
# waits on also run on this queue.
agents:
  queue: hosted

cache:
  name: "build-cache"
  paths:
    - "/gocache"
    - "/gomodcache"
  size: "100g"

steps:
  - group: ":mag: Quality Checks"
    key: quality-checks
    steps:
    - name: ":golangci-lint: lint"
      command: golangci-lint run --output.checkstyle.path checkstyle.xml --verbose --timeout 3m
      artifact_paths:
        - checkstyle.xml
      env:
        GOCACHE: /gocache
        GOMODCACHE: /gomodcache
      plugins:
        - mise#v1.1.1: ~

    - name: ":go: test"
      artifact_paths:
        - cover-tree.svg
        - junit.xml
      commands:
        - go run gotest.tools/gotestsum@latest --junitfile junit.xml --format testname -- -coverprofile=cover.out ./...
        - go run github.com/nikolaydubina/go-cover-treemap@latest -coverprofile cover.out > cover-tree.svg
        - echo '<details><summary>Coverage tree map</summary><img src="artifact://cover-tree.svg" alt="Test coverage tree map" width="70%"></details>' | buildkite-agent annotate --style "info"
      env:
        GOCACHE: /gocache
        GOMODCACHE: /gomodcache
      plugins:
        - mise#v1.1.1: ~
  - label: ":buildkite: Running scenarios"
    key: agent
    depends_on: quality-checks
    command: ./scripts/babystand.sh
    # LOOP GUARD: scenario branches are "inert" — Quality Checks above still run on
    # them (giving the eval a real red->green CI signal to fix), but this eval step
    # is skipped there, so babystand.sh cannot recurse (create scenario branch ->
    # its push builds -> babystand -> create scenario branch -> ... forever).
    # babystand also pushes the scenario branch WITHOUT opening a PR, so no
    # pull_request events reach the mcp-eval trigger. Both together break the loop.
    branches: "!mcp-eval-scenario-*"
    # Run the (blocking) eval agent on a dedicated queue, separate from the PR CI
    # queue above, so the eval and the scenario builds it waits on never contend
    # for the same agents.
    agents:
      queue: default-queue
    plugins:
      - docker#v5.11.0:
          image: buildkite-mcp-server-evals:latest
          mount-checkout: false
          mount-buildkite-agent: true
          environment:
            - BUILDKITE
            - BUILDKITE_AGENT_ENDPOINT
            - BUILDKITE_AGENT_ACCESS_TOKEN
            - BUILDKITE_API_TOKEN
            - BUILDKITE_BUILD_URL
            - BUILDKITE_ORGANIZATION_SLUG
            - BUILDKITE_PIPELINE_SLUG
            - BUILDKITE_MCP_SERVER_VERSION
            - GITHUB_CLI_VERSION
            - GITHUB_TOKEN
            - TRIGGER_ON_LABEL
            - MODEL_PROVIDER
            # Select the sandboxed claude.sh execution path in babystand.sh.
            - RUN_IN_CI=true
            - LOCAL_CI=false
            - DEBUG_PERMISSIONS=false
            # Per-message parser annotations are on by default; set to "false"
            # (in the top-level env: block) to rely only on the curated summaries.
            - ANNOTATE_MESSAGES
    secrets:
      GITHUB_TOKEN: GITHUB_TOKEN
      BUILDKITE_API_TOKEN: API_TOKEN_BUILDKITE
