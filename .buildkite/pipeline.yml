image: "buildkite/hosted-agent-base-images:ubuntu-jammy"

agents:
  queue: default-queue

cache:
  name: "build-cache"
  paths:
    - "/gocache"
    - "/gomodcache"
  size: "100g"

steps:
  - group: ":mag: Quality Checks"
    key: quality-checks
    steps:
    - name: ":golangci-lint: lint"
      command: golangci-lint run --output.checkstyle.path checkstyle.xml --verbose --timeout 3m
      artifact_paths:
        - checkstyle.xml
      env:
        GOCACHE: /gocache
        GOMODCACHE: /gomodcache
      plugins:
        - mise#v1.1.1: ~

    - name: ":go: test"
      artifact_paths:
        - cover-tree.svg
        - junit.xml
      commands:
        - go run gotest.tools/gotestsum@latest --junitfile junit.xml --format testname -- -coverprofile=cover.out ./...
        - go run github.com/nikolaydubina/go-cover-treemap@latest -coverprofile cover.out > cover-tree.svg
        - echo '<details><summary>Coverage tree map</summary><img src="artifact://cover-tree.svg" alt="Test coverage tree map" width="70%"></details>' | buildkite-agent annotate --style "info"
      env:
        GOCACHE: /gocache
        GOMODCACHE: /gomodcache
      plugins:
        - mise#v1.1.1: ~

  - group: ":test_tube: State Semantics Test"
    key: state-semantics-test
    steps:
    # Produces a job with state "broken" (Buildkite's term for a skipped step).
    # It never runs and has NO logs — the exact case that confuses the MCP agent.
    - name: ":ghost: broken (skipped) job"
      command: echo "this never runs"
      skip: "intentionally skipped to test broken/skipped state semantics"

    # Produces a job with state "finished" and exit_status != 0 (a real failure with logs).
    # soft_fail keeps the failing command (and its logs) for state-semantics testing
    # while allowing the overall build to pass green.
    - name: ":boom: failed job"
      command: |
        echo "About to fail on purpose..."
        exit 1
      soft_fail: true
