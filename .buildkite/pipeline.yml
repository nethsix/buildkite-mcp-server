image: "buildkite/hosted-agent-base-images:ubuntu-jammy"

secrets:
  GITHUB_TOKEN: GITHUB_TOKEN
  BUILDKITE_API_TOKEN: API_TOKEN_BUILDKITE

env:
  GITHUB_CLI_VERSION: "2.83.0"
  BUILDKITE_MCP_SERVER_VERSION: "0.7.3"
  TRIGGER_ON_LABEL: "mcp-eval"
  MODEL_PROVIDER: "anthropic"
  # Queue for the blocking eval agent step (babystand.sh), generated by
  # scripts/handler.ts. Kept separate from the PR CI queue below so the eval
  # agent and the PR builds it waits on never contend for the same agents.
  EVAL_AGENT_QUEUE: "default-queue"

agents:
  queue: hosted

cache:
  name: "build-cache"
  paths:
    - "/gocache"
    - "/gomodcache"
  size: "100g"

steps:
  - group: ":test_tube: State Semantics Test"
    key: state-semantics-test
    steps:
    # Produces a job with state "broken"
    - name: ":ghost: job #1"
      command: echo "i'm broke!"
      skip: "intentionally skipped to test broken/skipped state semantics"

    # Produces a job with state "finished" and exit_status != 0.
    # soft_fail lets the job exit non-zero (preserving the failed-state
    # fixture) without failing the overall build.
    - name: ":boom: job #2"
      command: |
        echo "i'm fine..."
        exit 1
      soft_fail: true

  - label: ":node: Generate the eval pipeline"
    command: |

      if [[ "${BUILDKITE_SOURCE:-}" != "webhook" || -z "${BUILDKITE_TRIGGER_ID:-}" ]]; then
        echo "Not a webhook trigger -- exiting."
        exit 0
      fi

      # Generate and upload the pipeline to handle the webhook.
      echo "--- :webhook: Run the webhook handler"
      npm install && npm run build
      node dist/handler
